<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ValidaçãoTwo</title>
</head>

<body>
    <main>
        <div class="caixa">
            <h2>Login</h2>

            <div class="icons">
                <a href="https://www.facebook.com/?locale=pt_BR" target="_blank"><img src="/icons/facebook.png"
                        alt="Ícone Facebook" width="30px"></a>
                <a href="https://www.instagram.com/?flo=true" target="_blank"><img src="/icons/instagram.png"
                        alt="Ícone Instagram" width="30px" height="30px"></a>
                <a href="https://www.linkedin.com/home" target="_blank"><img src="/icons/linkedin.png"
                        alt="Ícone Linkedin" width="40px" height="40px"></a>
            </div>

            <div class="email">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="test@gmail.com">
                <p id="mensagemE"></p>
            </div>

            <div class="senha">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" placeholder="Senha">
                <p id="mensagem"></p>
            </div>
            <button onclick="enviarLogin()" type="submit">Entrar</button>


        </div>

        <script src="/validacao.js"></script>
</body>


</html>
